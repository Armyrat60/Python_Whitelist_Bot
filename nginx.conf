# nginx.conf — production reverse proxy for Squad Whitelister
#
# Usage:
#   docker run -v $(pwd)/nginx.conf:/etc/nginx/nginx.conf:ro \
#              -p 80:80 -p 443:443 nginx
#
# Or copy to /etc/nginx/nginx.conf on a VPS and reload:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   - SSL certificate files at /etc/nginx/ssl/ (or update paths below)
#   - For Let's Encrypt: use certbot to generate and auto-renew certs
#     sudo certbot --nginx -d yourdomain.com

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Limit API requests to 60/min per IP to protect backend
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    # Stricter limit for auth endpoints (prevent brute-force)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream web_backend {
        server 127.0.0.1:8080;
        keepalive 16;
    }

    upstream frontend_backend {
        server 127.0.0.1:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name yourdomain.com www.yourdomain.com;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name yourdomain.com www.yourdomain.com;

        # SSL — update paths to match your certificate provider
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern TLS settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS (1 year) — only enable once SSL is stable
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # ── Whitelist file downloads (/wl/*) → Python web service ───────────
        location /wl/ {
            proxy_pass http://web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # These files can be large; increase timeouts
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # ── REST API + OAuth → Python web service ────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;
        }

        # ── OAuth callback → Python web service ──────────────────────────────
        location /auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health check → Python web service ────────────────────────────────
        location /healthz {
            proxy_pass http://web_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Session info (used by Next.js frontend) ──────────────────────────
        location /session {
            proxy_pass http://web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Everything else → Next.js frontend ───────────────────────────────
        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";  # WebSocket support (Next.js HMR)

            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;
        }

        # ── Static file caching for Next.js assets ────────────────────────────
        location /_next/static/ {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Favicon / robots.txt ──────────────────────────────────────────────
        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }
    }
}
