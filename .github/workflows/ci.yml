name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: find bot/ -name '*.py' -exec python -m py_compile {} +

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check bot/

      - name: Run tests
        run: |
          if [ -d tests ] && find tests -name 'test_*.py' -o -name '*_test.py' | grep -q .; then
            pip install pytest
            pytest tests/
          else
            echo "No test files found, skipping"
          fi

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Lint
        run: |
          if npm run --silent lint -- --help >/dev/null 2>&1; then
            npm run lint
          else
            echo "No lint script found, skipping"
          fi
        working-directory: frontend

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: api
      - name: Type check
        run: npx tsc --noEmit
        working-directory: api
      - name: Run tests
        run: npm test
        working-directory: api

  playwright:
    name: Playwright Smoke Tests
    runs-on: ubuntu-latest
    needs: frontend
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend
      - name: Run Playwright tests
        run: npx playwright test
        working-directory: frontend
        env:
          BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL || 'https://squadwhitelister.com' }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
